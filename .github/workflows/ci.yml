name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt JavaScript actions into Node.js 24 ahead of the Sep 2026 mandatory
# cutover (same pattern applied on the OpsMind workflow).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      # Include the new postcode + news modules in the lint surface so a
      # future rule change lands in CI too, not just locally.
      - run: ruff check app.py data.py cache.py validators.py postcode.py news.py
      - name: Type check (ty)
        run: |
          pip install ty
          ty check . || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v --timeout=30
